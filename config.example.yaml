server:
  host: 127.0.0.1
  port: 18080
  cors_origins:
    - http://127.0.0.1:5173
    - http://localhost:5173

llm:
  provider: openai_compatible
  base_url: http://127.0.0.1:11434/v1
  api_key: ollama
  model: qwen2.5:14b
  timeout_seconds: 120
  temperature: 0.2
  max_tool_rounds: 4

asr:
  provider: http
  base_url: http://127.0.0.1:8101
  timeout_seconds: 120
  language: zh

tts:
  provider: http
  base_url: http://127.0.0.1:8102
  timeout_seconds: 120
  voice: default

tools:
  shell:
    enabled: true
    bash_enabled: true
    timeout_seconds: 30
    allow_dangerous: false
    max_output_chars: 12000
  windows:
    enabled: true
    screenshot_dir: data/screenshots
    allow_coordinate_clicks: false
    ocr_enabled: false

storage:
  audit_db_path: data/audit.db

policy:
  require_confirmation_for_write_actions: true
